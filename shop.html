{% extends 'base.html' %}
{% block content %}
<h2>Browse Pharmacy</h2>
<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px;">
    {% for drug in drugs %}
    <div style="background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center;">
        <h3 style="margin-bottom: 5px; color: #2c3e50;">{{ drug.name }}</h3>
        <span class="badge" style="background: #95a5a6; margin-bottom: 15px; display: inline-block;">{{ drug.category_name }}</span>
        
        <h2 style="color: #27ae60; margin-bottom: 15px;">₹{{ drug.final_price }}</h2>

        <form method="POST" action="{{ url_for('add_to_cart') }}" style="display: flex; flex-direction: column; gap: 10px;">
            <input type="hidden" name="drug_id" value="{{ drug.id }}">
            <input type="hidden" name="name" value="{{ drug.name }}">
            <input type="hidden" name="price" value="{{ drug.final_price }}">
            <input type="hidden" name="stock" value="{{ drug.stock }}">
            
            <div style="display: flex; justify-content: center; align-items: center; gap: 10px;">
                <label style="font-size: 0.9rem;">Qty:</label>
                <input type="number" name="quantity" min="1" max="{{ drug.stock }}" value="1" required style="padding: 5px; width: 60px; text-align: center;">
            </div>
            <button type="submit" class="btn-secondary">Add to Cart</button>
        </form>
        <p style="font-size: 0.8rem; color: #7f8c8d; margin-top: 10px;">{{ drug.stock }} left in stock</p>
    </div>
    {% endfor %}
</div>
{% endblock %}
