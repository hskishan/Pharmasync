{% extends 'base.html' %}
{% block content %}
<div class="auth-card" style="max-width: 600px;">
    <h2>Add Drug Category</h2>
    <form method="POST" action="{{ url_for('add_category') }}">
        <div class="form-group">
            <label>Category Name</label>
            <input type="text" name="name" placeholder="e.g., Antibiotics, Painkillers" required>
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea name="description" rows="4" placeholder="Brief description of this category..." required></textarea>
        </div>
        <button type="submit" class="btn-primary">Save Category</button>
    </form>
</div>
{% endblock %}
